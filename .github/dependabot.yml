version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nuget"
    directory: "/backend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "uv"
    directory: "/ai-worker"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directories:
      - "/frontend"
      - "/backend"
      - "/ai-worker"
      - "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
