# Development stack. Source directories are bind-mounted into the containers
# for hot reload; dependencies live in named volumes built into the images.
services:
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
    ports:
      # Host port 5180: 5173 tends to be taken by other Vite projects.
      - "5180:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: backend
      dockerfile: Dockerfile.dev
    ports:
      # Host port 8180, same offset logic as the frontend's 5180.
      - "8180:8080"
    volumes:
      - ./backend:/app
      - backend_nuget:/home/app/.nuget

volumes:
  # Mask the bind mount: dependencies are the image's (linux builds),
  # never the host's. Seeded from the image on first start.
  frontend_node_modules:
  backend_nuget:
