# Development stack. Source directories are bind-mounted into the containers
# for hot reload; dependencies live in named volumes built into the images.
services:
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
    ports:
      # Host port 5180: 5173 tends to be taken by other Vite projects.
      - "5180:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: backend
      dockerfile: Dockerfile.dev
    ports:
      # Host port 8180, same offset logic as the frontend's 5180.
      - "8180:8080"
    volumes:
      - ./backend:/app
      - backend_nuget:/home/app/.nuget
    environment:
      # Dev-only credentials, matching the postgres and redis services below.
      ConnectionStrings__Database: "Host=postgres;Database=verbatim;Username=verbatim;Password=verbatim"
      ConnectionStrings__Redis: "redis:6379,password=verbatim"
      Database__MigrateOnStartup: "true"
      Email__SmtpHost: "mailpit"
      Email__SmtpPort: "1025"
      Email__From: "noreply@verbatim.yantech.fr"
      Auth__PublicBaseUrl: "http://localhost:5180"
      # Dev serves plain HTTP: browsers would drop a Secure cookie.
      Auth__SecureCookies: "false"
    # Lets Testcontainers-driven test runs reach ports published on the
    # Docker host, including on plain Linux (CI runners).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-worker:
    build:
      context: ai-worker
      dockerfile: Dockerfile.dev
    environment:
      # Dev-only credentials, matching the postgres and redis services below.
      DATABASE_URL: "postgresql://verbatim:verbatim@postgres:5432/verbatim"
      REDIS_URL: "redis://:verbatim@redis:6379/0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./ai-worker:/app
      - ai_worker_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mailpit:
    # Fake SMTP for dev and e2e: catches every outgoing mail; UI and REST API
    # on port 8025 let humans and tests read what was actually sent.
    image: axllent/mailpit@sha256:5a49a77c5bdbe7c5474450b4f46348d09949df3695257729c93a30369382d4f6
    ports:
      # Host port 8125 (UI + API), same offset logic as the other services.
      - "8125:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    # Password even in dev, for parity with production. The queue is pure
    # transport (analysis ids only) — no data volume: state lives in Postgres.
    command: ["redis-server", "--requirepass", "verbatim"]
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=verbatim redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      # Dev-only credentials; production gets real secrets outside the repo.
      POSTGRES_DB: verbatim
      POSTGRES_USER: verbatim
      POSTGRES_PASSWORD: verbatim
    # No published port: the database is only reachable from the compose
    # network (make psql opens a client inside the container).
    volumes:
      # Postgres 18+ images want the mount one level above .../data, so the
      # data lands in a versioned subdirectory (pg_upgrade-friendly).
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verbatim -d verbatim"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  # Mask the bind mount: dependencies are the image's (linux builds),
  # never the host's. Seeded from the image on first start.
  frontend_node_modules:
  backend_nuget:
  ai_worker_venv:
  # Database data — survives make rebuild (it is not a dependency volume).
  postgres_data:
