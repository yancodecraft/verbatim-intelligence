# Development stack. Source directories are bind-mounted into the containers
# for hot reload; dependencies live in named volumes built into the images.
services:
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
    ports:
      # Host port 5180: 5173 tends to be taken by other Vite projects.
      - "5180:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: backend
      dockerfile: Dockerfile.dev
    ports:
      # Host port 8180, same offset logic as the frontend's 5180.
      - "8180:8080"
    volumes:
      - ./backend:/app
      - backend_nuget:/home/app/.nuget
    environment:
      # Dev-only credentials, matching the postgres service below.
      ConnectionStrings__Database: "Host=postgres;Database=verbatim;Username=verbatim;Password=verbatim"
      Database__MigrateOnStartup: "true"
    depends_on:
      postgres:
        condition: service_healthy

  ai-worker:
    build:
      context: ai-worker
      dockerfile: Dockerfile.dev
    environment:
      # Dev-only credentials, matching the postgres service below.
      DATABASE_URL: "postgresql://verbatim:verbatim@postgres:5432/verbatim"
    volumes:
      - ./ai-worker:/app
      - ai_worker_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      # Dev-only credentials; production gets real secrets outside the repo.
      POSTGRES_DB: verbatim
      POSTGRES_USER: verbatim
      POSTGRES_PASSWORD: verbatim
    # No published port: the database is only reachable from the compose
    # network (make psql opens a client inside the container).
    volumes:
      # Postgres 18+ images want the mount one level above .../data, so the
      # data lands in a versioned subdirectory (pg_upgrade-friendly).
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verbatim -d verbatim"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  # Mask the bind mount: dependencies are the image's (linux builds),
  # never the host's. Seeded from the image on first start.
  frontend_node_modules:
  backend_nuget:
  ai_worker_venv:
  # Database data — survives make rebuild (it is not a dependency volume).
  postgres_data:
