# Production stack. Images are pulled from GHCR by digest-stable tags;
# secrets come from /opt/verbatim/.env (templated by Ansible, never in the
# repo). Postgres and Redis are never published on the host.
services:
  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
    volumes:
      - /opt/verbatim/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  frontend:
    image: ghcr.io/yancodecraft/verbatim-intelligence/frontend:${TAG}
    restart: unless-stopped

  backend:
    image: ghcr.io/yancodecraft/verbatim-intelligence/backend:${TAG}
    restart: unless-stopped
    environment:
      ConnectionStrings__Database: "Host=postgres;Database=verbatim;Username=verbatim;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # One-shot job: applies EF Core migrations, then exits. The backend only
  # starts once it has succeeded (the schema contract is honored first).
  migrate:
    image: ghcr.io/yancodecraft/verbatim-intelligence/migrations:${TAG}
    restart: "no"
    environment:
      ConnectionStrings__Database: "Host=postgres;Database=verbatim;Username=verbatim;Password=${POSTGRES_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy

  ai-worker:
    image: ghcr.io/yancodecraft/verbatim-intelligence/ai-worker:${TAG}
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://verbatim:${POSTGRES_PASSWORD}@postgres:5432/verbatim"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    restart: unless-stopped
    environment:
      POSTGRES_DB: verbatim
      POSTGRES_USER: verbatim
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verbatim -d verbatim"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
