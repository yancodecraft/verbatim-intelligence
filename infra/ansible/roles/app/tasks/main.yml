# The application: compose file, edge Caddy config, secrets — then pull
# and converge the stack. Rerunning with the same TAG is a no-op.
#
# The image tag is never defaulted to a mutable one: an explicit TAG wins,
# otherwise the currently deployed tag is reused (infra-only changes),
# otherwise the deploy refuses.
- name: Read the current deployment
  ansible.builtin.slurp:
    src: /opt/verbatim/.env
  register: current_env
  failed_when: false

- name: Resolve the image tag to deploy
  ansible.builtin.set_fact:
    app_tag: >-
      {{ tag
         if tag is defined
         else ((current_env.content | b64decode | regex_search('TAG=(.+)', '\1') | first)
               if current_env.content is defined else '') }}

- name: Refuse to deploy without a resolvable tag
  ansible.builtin.fail:
    msg: "No TAG given and no previous deployment to reuse — run: TAG=<commit-sha> make deploy"
  when: app_tag | trim == ''

- name: Create the application directory
  ansible.builtin.file:
    path: /opt/verbatim
    state: directory
    mode: "0755"

- name: Install the compose file
  ansible.builtin.copy:
    src: compose.yaml
    dest: /opt/verbatim/compose.yaml
    mode: "0644"

- name: Install the Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /opt/verbatim/Caddyfile
    mode: "0644"

- name: Install the environment file (secrets)
  ansible.builtin.template:
    src: env.j2
    dest: /opt/verbatim/.env
    mode: "0600"

- name: Pull and converge the stack
  community.docker.docker_compose_v2:
    project_src: /opt/verbatim
    pull: always
    state: present
    wait: true
    wait_timeout: 180

# Post-deploy smoke tests, from the controller through the public edge:
# a deploy that does not serve real traffic has not happened.
- name: Smoke test — unauthenticated requests are rejected
  delegate_to: localhost
  ansible.builtin.uri:
    url: "https://{{ app_domain }}/"
    status_code: 401
  retries: 6
  delay: 10
  register: unauthenticated_check
  until: unauthenticated_check.status == 401

- name: Smoke test — the API answers healthy behind auth
  delegate_to: localhost
  ansible.builtin.uri:
    url: "https://{{ app_domain }}/api/health"
    user: "{{ basic_auth_user }}"
    password: "{{ basic_auth_password }}"
    force_basic_auth: true
    return_content: true
  register: health_check
  retries: 6
  delay: 10
  until: health_check.status == 200 and 'Healthy' in health_check.content
