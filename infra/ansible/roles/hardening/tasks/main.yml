# Baseline hardening: key-only SSH, host firewall (defense in depth on top
# of the Scaleway security group), fail2ban, automatic security updates.

# F7 (docs/security-review.md): deployments connect as a non-root user with
# passwordless sudo, not as root. Created first and unconditionally, so
# switching the inventory onto it — and later disabling root SSH — never
# races its own prerequisite. Same key as root: no new secret to manage.
- name: Create the deploy user
  ansible.builtin.user:
    name: deploy
    shell: /bin/bash
    create_home: true

- name: Grant the deploy user passwordless sudo
  ansible.builtin.copy:
    dest: /etc/sudoers.d/deploy
    content: "deploy ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: visudo -cf %s

- name: Ensure the deploy user's .ssh directory
  ansible.builtin.file:
    path: /home/deploy/.ssh
    state: directory
    owner: deploy
    group: deploy
    mode: "0700"

- name: Authorize the deployment key for the deploy user
  ansible.builtin.copy:
    src: /root/.ssh/authorized_keys
    dest: /home/deploy/.ssh/authorized_keys
    remote_src: true
    owner: deploy
    group: deploy
    mode: "0600"

- name: Harden the SSH daemon
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin prohibit-password
    mode: "0644"
  notify: Restart ssh

- name: Install fail2ban and unattended-upgrades
  ansible.builtin.apt:
    name:
      - fail2ban
      - unattended-upgrades
    state: present
    update_cache: true

- name: Enable fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Enable automatic security updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"

- name: Allow SSH, HTTP and HTTPS through the host firewall
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ["22", "80", "443"]

- name: Enable the host firewall, deny inbound by default
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
