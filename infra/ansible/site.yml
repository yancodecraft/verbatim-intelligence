# The whole server configuration, declaratively. Rerunnable at will:
# a second run must report changed=0 (converging the stack on the same
# image tag included).
- name: Configure the verbatim server
  hosts: verbatim
  # Connect as the non-root deploy user, sudo to root for the work (F7).
  become: true
  vars_files:
    # Mounted by `make configure` / `make deploy` from outside the repo.
    - /secrets/prod.yml
  vars:
    app_domain: verbatim.yantech.fr
    aws_cli_image: amazon/aws-cli@sha256:238583846e731f31c9848dae26c5a560769ff35c4c5368a4cb6be5816683e485
  roles:
    - hardening
    - docker
    - app
    - backup
